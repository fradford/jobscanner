query:
  includeKeywords:
    - software engineer
    - software developer
    - frontend
    - backend
    - typescript
    - junior
  excludeKeywords:
    - staff
    - senior
    - director
    - manager
  locations:
    - remote
    - canada
    - fredericton
    - new brunswick
    - nb
  remoteOnly: false
  minSalary: 60000
  preferredCurrency: "CAD"

request:
  timeoutMs: 15000
  throttleMs: 300
  maxPages: 5
  userAgent: "jobscanner/0.1"

output:
  maxResults: 50

sources:
  - company: Anthropic
    type: greenhouse
    boardToken: anthropic
    enabled: true

  - company: Vercel
    type: greenhouse
    boardToken: vercel
    enabled: true
